<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeArena Login</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-container">

  <!-- Login Form -->
  <div class="form-box">
    <h2>LOGIN</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="toggle">Don't have account? 
      <span onclick="showSignup()">Create One</span>
    </p>
  </div>

  <!-- Signup Form -->
  <div class="form-box hidden">
    <h2>SIGN UP</h2>
    <input id="newUser" placeholder="Create Username">
    <input id="newPass" type="password" placeholder="Create Password">
    <button onclick="signup()">Register</button>
    <p class="toggle">Already have account? 
      <span onclick="showLogin()">Login Here</span>
    </p>
  </div>

</div>

<script src="auth.js"></script>
</body>
</html>
